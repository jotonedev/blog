<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
{{- partial "head.html" . -}}
<body>
    <div class="page-content">
        <div class="w{{ if .Params.wide }} w-wide{{ end }}">
            <header class="site-header">
                {{- partial "nav.html" . -}}
            </header>
            <main id="main">
                {{- block "main" . }}{{- end }}
            </main>
            {{- partial "footer.html" . -}}
        </div>
    </div>
</body>
</html>
