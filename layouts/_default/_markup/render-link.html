{{- /* Links leaving the site open in a new tab and never leak the opener. */ -}}
{{- $external := or (hasPrefix .Destination "http://") (hasPrefix .Destination "https://") (hasPrefix .Destination "//") -}}
{{- $internal := and $external (hasPrefix .Destination site.BaseURL) -}}
<a href="{{ .Destination | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}
   {{- if and $external (not $internal) }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Text }}</a>
