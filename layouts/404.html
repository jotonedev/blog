{{ define "main" }}
<div class="error-404-container">
    {{- with resources.Get "404-pixel-art.svg" }}
    <div class="pixel-art-wrapper">
        {{- $art := . | minify | fingerprint }}
        <img src="{{ $art.RelPermalink }}" alt="" class="pixel-art-img" width="280" height="246" decoding="async">
    </div>
    {{- end }}

    <h1 class="error-title">404 Not Found</h1>
</div>
{{ end }}
