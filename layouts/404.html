{{ define "main" }}
<div class="error-404-container">
    <div class="pixel-art-wrapper">
        {{ $pixelArt := resources.Get "404-pixel-art.svg" }}
        {{ if $pixelArt }}
            <img src="{{ $pixelArt.RelPermalink }}" alt="Funny 404 Pixel Art" class="pixel-art-img" />
        {{ end }}
    </div>

    <h1 class="error-title">404: Not Found</h1>

    <div class="error-actions">
        <a href="{{ "/" | relURL }}" class="home-btn">
            Take Me Home
        </a>
    </div>
</div>
{{ end }}
