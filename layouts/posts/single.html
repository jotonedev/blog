{{ define "main" }}

<article class="single-post">
    <div class="post-header">
        <h1 class="single-post-title">{{ .Title }}</h1>
        <div class="single-post-meta">
            <time datetime="{{ .Date }}">{{ .Date | time.Format "January 02, 2006" }}</time>
        </div>
    </div>

    {{ if .Params.toc }}
        <aside class="post-toc">
            <details open>
                <summary class="toc-heading">Table of Contents</summary>
                {{ .TableOfContents }}
            </details>
        </aside>
    {{ end }}

    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
