baseURL = "https://jotone.it/"
languageCode = "en-us"
title = "Jotone's blog"

[module]
  [module.hugoVersion]
    extended = true
    min      = "0.41.0"

  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    source = "assets/company"
    target = "static/company"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "static"
    target = "static"

  [[module.mounts]]
    source = "data"
    target = "data"

  [[module.mounts]]
    source = "images"
    target = "static/images"

  [[module.mounts]]
    source = "images"
    target = "assets/images"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true

  [markup.highlight]
    anchorLineNos      = false
    codeFences         = true
    guessSyntax        = false
    hl_Lines           = ''
    hl_inline          = false
    lineAnchors        = ''
    lineNoStart        = 1
    lineNos            = false
    lineNumbersInTable = true
    noClasses          = true
    noHl               = false
    style              = 'rrt'
    tabWidth           = 4

  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

[params]
  [params.theme_config]
    appearance        = "auto"
    back_home_text    = ".."
    date_format       = "2006-01-02"
    isListGroupByDate = false
    isShowFooter      = false
